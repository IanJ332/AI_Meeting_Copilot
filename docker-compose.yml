version: '3.8'

services:
  backend:
    build: .
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - PORT=5000
    volumes:
      - .:/app
    networks:
      - twinmind-network

  frontend:
    image: node:20-slim
    working_dir: /app/frontend
    volumes:
      - .:/app
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:5000/api
    command: sh -c "npm install && npm run dev -- --host"
    networks:
      - twinmind-network
    depends_on:
      - backend

networks:
  twinmind-network:
    driver: bridge
